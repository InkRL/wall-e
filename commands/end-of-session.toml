description = "Clean up the workspace before handoff or commit"
prompt = "Clean up this workspace before handoff, commit, review, or a context switch. Inspect first: git status, git diff --stat, git diff (and the --cached versions if anything is staged). Group real changes into coherent commits with descriptive messages; stash incomplete or unwanted work with git stash push -m '<why>' rather than committing it half-done. Add genuine recurring junk (caches, build output, .env, editor files) to .gitignore; git rm --cached anything already tracked that shouldn't be, and commit both together. Delete obvious temp files (__pycache__, *.pyc, .DS_Store, stray logs, swap files, agent scratch dumps) but never source, fixtures, lockfiles, datasets, or anything code references — ask if unsure. Scan the diff and new files for secrets (keys, tokens, passwords, private keys); never commit or print one, move it to an env var, add a placeholder to .env.example, and flag it for rotation. Update docs only where behavior, setup, commands, or env vars actually changed. Run whatever test/lint/build this repo already has and report the real results. Finish with a short handoff note: what changed, what's still open, what to check next. Never delete an uncertain file without asking, bump dependencies without a reason, or mix unrelated changes into one commit."
